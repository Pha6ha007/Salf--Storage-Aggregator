version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: storagecompare-postgres
    environment:
      POSTGRES_DB: storagecompare
      POSTGRES_USER: storage
      POSTGRES_PASSWORD: storage_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-extensions.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storage -d storagecompare"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: storagecompare-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./src/backend
      dockerfile: ../../Dockerfile
    container_name: storagecompare-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://storage:storage_dev_pass@postgres:5432/storagecompare?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src/backend:/app
      - /app/node_modules
    command: npm run start:dev

volumes:
  pgdata:
