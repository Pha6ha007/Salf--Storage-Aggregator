version: 2

updates:
  # Backend — NestJS
  - package-ecosystem: "npm"
    directory: "/src/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Dubai"
    open-pull-requests-limit: 10
    # Auto-group patch/minor updates to reduce PR noise
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      aws:
        patterns:
          - "@aws-sdk/*"
      dev-tools:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Labels for easy filtering
    labels:
      - "dependencies"
      - "security"
    # Only auto-merge patch updates (minor/major need review)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Frontend — Next.js
  - package-ecosystem: "npm"
    directory: "/frontend/frontend/my-app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Dubai"
    open-pull-requests-limit: 5
    groups:
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
      dev-tools:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "frontend"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — keep action versions current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
