name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # Run full scan every Monday at 08:00 Dubai time (04:00 UTC)
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write  # Required to upload SARIF results to GitHub Security tab
  actions: read

jobs:
  # ── 1. CodeQL — static analysis of source code ───────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Extended security queries — covers injection, XSS, path traversal,
          # hardcoded credentials, insecure deserialization, etc.
          queries: security-extended,security-and-quality

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install backend dependencies
        working-directory: ./src/backend
        run: npm ci

      - name: Generate Prisma client (required for tsc)
        working-directory: ./src/backend
        run: npx prisma generate --schema=src/prisma/schema.prisma

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Upload results to GitHub Security tab
          upload: always

  # ── 2. Dependency audit — production deps only, BLOCKS on critical/high ──
  dependency-audit-backend:
    name: Dependency Audit — Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./src/backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./src/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies only
        # --omit=dev: skip devDependencies (jest, nestjs/cli, etc.) — only runtime code matters
        # --audit-level=high: FAIL on high/critical in production deps
        run: npm audit --omit=dev --audit-level=high
        # NOTE: do NOT use continue-on-error here — high/critical blocks the pipeline

      - name: Full audit report (informational — includes dev deps)
        run: npm audit --audit-level=critical || true
        # continue-on-error because dev vulns (jest, prisma CLI) are accepted risk

  dependency-audit-frontend:
    name: Dependency Audit — Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./frontend/frontend/my-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies only
        run: npm audit --omit=dev --audit-level=high

  # ── 3. Secret scanning — catch leaked credentials in code ─────────────────
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history — scan all commits, not just latest
          fetch-depth: 0

      - name: TruffleHog — scan for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          # On PR: scan only new commits (fast)
          # On push to main: scan full history
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || 'HEAD' }}
          extra_args: >
            --only-verified
            --fail
        # Fails if a verified secret (one that actually works against the API) is found

  # ── 4. Hardcoded secrets pattern check — fast regex scan ─────────────────
  pattern-scan:
    name: Pattern Scan (hardcoded secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for hardcoded secrets patterns
        run: |
          echo "🔍 Scanning for hardcoded secrets..."
          FOUND=0

          # Patterns that should NEVER appear in source code
          # (env vars and .env files are excluded)
          patterns=(
            # AWS keys
            "AKIA[0-9A-Z]{16}"
            # Anthropic keys  
            "sk-ant-[a-zA-Z0-9\-]+"
            # SendGrid keys
            "SG\.[a-zA-Z0-9\-_\.]{22,}"
            # Twilio SID
            "AC[a-z0-9]{32}"
            # Paddle keys
            "pdl_[a-zA-Z0-9_]+"
            # Generic: assignment of secret-sounding var to string literal
            "(secret|password|api_key|apikey|token)\s*[=:]\s*['\"][^'\"]{8,}['\"]"
          )

          for pattern in "${patterns[@]}"; do
            # Exclude: .env files, test fixtures, spec files, this workflow itself
            matches=$(grep -rn --include="*.ts" --include="*.js" --include="*.json" \
              -E "$pattern" \
              --exclude-dir=node_modules \
              --exclude-dir=dist \
              --exclude-dir=.next \
              --exclude="*.spec.ts" \
              --exclude="*.e2e-spec.ts" \
              . 2>/dev/null | grep -v "\.env" | grep -v "security-scanning.yml" || true)

            if [ -n "$matches" ]; then
              echo "❌ Potential secret found (pattern: $pattern):"
              echo "$matches"
              FOUND=1
            fi
          done

          if [ $FOUND -eq 1 ]; then
            echo ""
            echo "❌ Hardcoded secrets detected. Move them to environment variables."
            exit 1
          else
            echo "✅ No hardcoded secrets found."
          fi

  # ── 5. Summary gate — all security checks must pass ──────────────────────
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs:
      - codeql
      - dependency-audit-backend
      - dependency-audit-frontend
      - secret-scan
      - pattern-scan
    if: always()

    steps:
      - name: Check all security jobs passed
        run: |
          echo "CodeQL:                  ${{ needs.codeql.result }}"
          echo "Dependency audit backend: ${{ needs.dependency-audit-backend.result }}"
          echo "Dependency audit frontend: ${{ needs.dependency-audit-frontend.result }}"
          echo "Secret scan:             ${{ needs.secret-scan.result }}"
          echo "Pattern scan:            ${{ needs.pattern-scan.result }}"

          if [[ "${{ needs.codeql.result }}" != "success" ]] || \
             [[ "${{ needs.dependency-audit-backend.result }}" != "success" ]] || \
             [[ "${{ needs.dependency-audit-frontend.result }}" != "success" ]] || \
             [[ "${{ needs.secret-scan.result }}" != "success" ]] || \
             [[ "${{ needs.pattern-scan.result }}" != "success" ]]; then
            echo ""
            echo "❌ One or more security checks FAILED."
            echo "   Review the GitHub Security tab and job logs above."
            exit 1
          fi

          echo ""
          echo "✅ All security checks passed."
