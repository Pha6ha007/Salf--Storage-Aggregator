name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint-and-build:
    name: Lint and Build Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/backend

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: ./src/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Check TypeScript
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: ./src/backend/dist
          retention-days: 7

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/backend

    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: storagecompare_test
          POSTGRES_USER: storage_test
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: ./src/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup test database extensions
        run: |
          PGPASSWORD=test_password psql -h localhost -U storage_test -d storagecompare_test -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
          PGPASSWORD=test_password psql -h localhost -U storage_test -d storagecompare_test -c 'CREATE EXTENSION IF NOT EXISTS "postgis";'
          PGPASSWORD=test_password psql -h localhost -U storage_test -d storagecompare_test -c 'CREATE EXTENSION IF NOT EXISTS "vector";'

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://storage_test:test_password@localhost:5432/storagecompare_test?schema=public

      - name: Run unit tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://storage_test:test_password@localhost:5432/storagecompare_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci
          NODE_ENV: test
        continue-on-error: true

      - name: Run e2e tests
        run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://storage_test:test_password@localhost:5432/storagecompare_test?schema=public
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-for-ci
          NODE_ENV: test
        continue-on-error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./src/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for vulnerabilities
        run: npm audit fix --dry-run
        continue-on-error: true
